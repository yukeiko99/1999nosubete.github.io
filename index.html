<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1999nosubete / ARCHIVE</title>
    <style>
        :root {
            --bg: #000;
            --silver: #e0e0e0;
            --dim: #444;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--silver);
            font-family: "Helvetica Neue", Helvetica, sans-serif;
            overflow-x: hidden;
        }

        /* 核心：动态噪点背景，模拟 kiiikiii 的胶片颗粒感 */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url(https://media.giphy.com/media/oEI9uWUic9Z5e/giphy.gif); /* 极轻微的噪点动画 */
            opacity: 0.03; pointer-events: none; z-index: 999;
        }

        /* 顶部导航：更有设计感的布局 */
        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            padding: 30px; display: flex; justify-content: space-between;
            mix-blend-mode: difference; /* 文字颜色随背景改变，非常高级 */
        }

        .logo { font-size: 1.2rem; font-weight: 900; letter-spacing: -1px; }

        /* 全屏首屏：那种冲击力 */
        .hero {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        .hero-title {
            font-size: 15vw; font-weight: 900; letter-spacing: -0.05em;
            color: transparent; -webkit-text-stroke: 1px #333; /* 镂空字体 */
        }

        /* 核心布局：碎片化错落排版 */
        .content {
            padding: 10vw; position: relative;
        }

        .img-box {
            position: relative; margin-bottom: 20vh;
        }

        /* 模拟 kiiikiii 风格的重叠文字 */
        .img-box::after {
            content: "1999_ALL_DATA";
            position: absolute; bottom: -20px; right: -20px;
            font-size: 4vw; font-weight: 900; color: rgba(255,255,255,0.05);
            z-index: -1;
        }

        .img-box img {
            width: 70%; height: auto; display: block;
            filter: saturate(0) contrast(1.2); /* 强烈的黑白高对比 */
            transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .img-box:nth-child(even) img { margin-left: auto; width: 50%; }

        .img-box:hover img {
            filter: saturate(1); transform: scale(1.02);
        }

        .caption {
            font-size: 10px; font-family: monospace; color: var(--dim);
            margin-top: 15px; letter-spacing: 2px;
        }

        footer {
            padding: 50px; text-align: center; font-size: 10px; color: var(--dim);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">1999nosubete</div>
    <div style="font-size: 10px;">SCROLL / 探索</div>
</header>

<div class="hero">
    <div class="hero-title">NOSUBETE</div>
</div>

<div class="content">
    <div class="img-box">
        <img src="001.jpg" alt="archive">
        <div class="caption">#INDEX_001 / LIGHT_AND_SHADOW</div>
    </div>

    <div class="img-box">
        <img src="002.jpg" alt="archive">
        <div class="caption">#INDEX_002 / NOISE_ATMOSPHERE</div>
    </div>
</div>

<footer>
    © 1999 ALL RIGHTS RESERVED.
</footer>

</body>
</html>
