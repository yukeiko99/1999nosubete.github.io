<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1999nosubete / ARCHIVE_ONLY</title>
    <style>
        :root {
            --bg: #f2f2f2;
            --klein-blue: #0047AB; 
            --silver-metal: #ccc;
            --main-text: #222;
            --accent-green: #00ff00;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--main-text);
            font-family: 'Helvetica', 'Arial', sans-serif;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        /* 千禧扫描线纹理 */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.02) 0px,
                rgba(0,0,0,0.02) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none; z-index: 1000;
        }

        /* 顶部导航：纯匿名 ID 设计 */
        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1000px; z-index: 100;
            padding: 12px 25px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid var(--silver-metal);
        }

        .logo { font-size: 1.1rem; font-weight: 900; color: var(--klein-blue); letter-spacing: -1px; text-transform: lowercase; }

        /* 首屏：极简机能 */
        .hero {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #fff 0%, #eee 100%);
            position: relative;
        }

        .hero-title {
            font-size: 12vw; font-weight: 900; letter-spacing: -0.08em;
            color: transparent; -webkit-text-stroke: 1px var(--klein-blue);
            transform: rotate(-2deg);
        }

        .decoration {
            position: absolute; font-family: monospace; font-size: 10px; color: rgba(0,0,0,0.1); pointer-events: none;
        }

        /* 内容布局 */
        .content {
            padding: 15vw; position: relative; max-width: 1200px; margin: 0 auto;
        }

        .img-box {
            position: relative; margin-bottom: 25vh;
            border-left: 1px solid var(--klein-blue); padding-left: 20px;
        }

        .img-box img {
            width: 85%; height: auto; display: block;
            border: 1px solid #ddd;
            filter: contrast(1.05) brightness(1.05);
            transition: 0.5s ease-out;
        }

        .img-box:hover img {
            transform: translateX(10px);
            box-shadow: 12px 12px 0 rgba(0, 71, 171, 0.1);
        }

        .caption {
            font-size: 10px; font-family: monospace; color: var(--klein-blue);
            margin-top: 15px; letter-spacing: 1px;
            display: flex; gap: 8px; align-items: center;
        }
        
        .caption-icon { width: 6px; height: 6px; border: 1px solid var(--klein-blue); }

        footer {
            margin-top: 50px; padding: 40px; text-align: center;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .copyright {
            font-size: 9px; color: #aaa; letter-spacing: 3px; font-family: monospace;
        }

        @media (max-width: 768px) {
            .content { padding: 10vw; }
            .img-box img { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">1999nosubete</div>
    <div style="font-size: 10px; font-family: monospace; color: #888;">ID: GUEST_ACCESS</div>
</header>

<div class="hero">
    <div class="hero-title">NOSUBETE</div>
    <div class="decoration" style="top: 25%; left: 15%;">[DATA_LOG: 1999]</div>
    <div class="decoration" style="bottom: 15%; right: 15%;">ACCESS_CODE: ****</div>
</div>

<div class="content">
    <div class="img-box">
        <img src="001.jpg" alt="visual_archive">
        <div class="caption">
            <div class="caption-icon"></div>
            #001 / SHADOW_CAPTURE / 2026_LOG
        </div>
    </div>

    <div class="img-box">
        <img src="002.jpg" alt="visual_archive" style="width: 65%; margin-left: auto;">
        <div class="caption" style="justify-content: flex-end;">
            #002 / CORE_ATMOSPHERE / V_02
            <div class="caption-icon"></div>
        </div>
    </div>
</div>

<footer>
    <div class="copyright">© 1999-2026 ARCHIVE SYSTEM. ALL RIGHTS RESERVED.</div>
</footer>

</body>
</html>
