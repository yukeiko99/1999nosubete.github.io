<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1999nosubete / PHANTOM_LOG</title>
    <style>
        :root {
            --bg: #dadada;
            --accent-red: #ff0000;
            --window-bg: rgba(255, 255, 255, 0.4);
            --serif: "Sorts Mill Goudy", serif;
        }

        body, html {
            margin: 0; padding: 0; height: 100vh;
            background-color: var(--bg);
            /* 这种网格背景更细碎，有 KiiiKiii 的电子垃圾感 */
            background-image: radial-gradient(#aaa 1px, transparent 1px);
            background-size: 15px 15px;
            overflow: hidden;
            font-family: var(--serif);
        }

        /* 顶部装饰：EVA 风格坐标 */
        .header-ui {
            position: fixed; top: 0; width: 100%; height: 50px;
            border-bottom: 1px solid #000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; box-sizing: border-box; font-size: 10px; font-family: monospace;
            z-index: 100; mix-blend-mode: exclusion; color: #fff;
        }

        /* 核心：NewJeans 风格的散落卡片 */
        .container {
            position: relative; width: 100vw; height: 100vh;
        }

        /* 弹窗/卡片基础样式：极简黑线 + 磨砂感 */
        .glass-card {
            position: absolute;
            background: var(--window-bg);
            backdrop-filter: blur(10px);
            border: 1px solid #000;
            padding: 10px;
            box-shadow: 10px 10px 0 rgba(0,0,0,0.05);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: move;
        }

        .glass-card:hover {
            transform: scale(1.02);
            z-index: 50 !important;
        }

        /* 今敏风格：图片的重影色差效果 */
        .img-wrap {
            position: relative; overflow: hidden;
            border: 1px solid #000;
        }

        .img-wrap img {
            width: 100%; display: block;
            filter: contrast(1.1) grayscale(20%);
        }

        /* 悬停时触发 Perfect Blue 式的自我崩坏感 */
        .glass-card:hover img {
            filter: sepia(30%) contrast(1.2);
            box-shadow: 5px 0 0 var(--accent-red), -5px 0 0 #00ffff;
            opacity: 0.8;
        }

        /* EVA 装饰：机能文字标签 */
        .tag-red {
            background: var(--accent-red); color: white;
            font-size: 9px; padding: 2px 5px; font-weight: bold;
            font-family: monospace; display: inline-block;
            margin-bottom: 5px;
        }

        /* 随机分布的位置 */
        #card1 { top: 15%; left: 10%; width: 280px; transform: rotate(-2deg); }
        #card2 { top: 10%; right: 15%; width: 220px; transform: rotate(3deg); }
        #card3 { bottom: 15%; left: 30%; width: 320px; transform: rotate(-1deg); }

        /* 闪烁的 [REC] 灯 */
        .rec-dot {
            width: 8px; height: 8px; background: var(--accent-red);
            border-radius: 50%; display: inline-block;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    </style>
</head>
<body>

<div class="header-ui">
    <div>1999_NOSUBETE_ARCHIVE_SYSTEM</div>
    <div><span class="rec-dot"></span> LIVE_REC: 2026.04.09</div>
    <div>COORDINATE: 35.6895° N, 139.6917° E</div>
</div>

<div class="container" id="drag-area">
    
    <div class="glass-card" id="card1">
        <span class="tag-red">CASE_FILE: 001</span>
        <div class="img-wrap">
            <img src="001.jpg" alt="visual" onerror="this.src='https://via.placeholder.com/300x400/dddddd/000000?text=IMAGE_NOT_FOUND'">
        </div>
        <p style="font-size: 11px; margin-top: 10px; letter-spacing: 1px;">
            // 记录下所有无法被定义的瞬间。<br>
            // DATA_STREAM: ERROR_REPORTED
        </p>
    </div>

    <div class="glass-card" id="card2">
        <div style="font-size: 20px; font-weight: 900; border-bottom: 1px solid #000; margin-bottom: 10px;">
            WHO ARE YOU?
        </div>
        <p style="font-size: 10px; font-family: monospace; color: var(--accent-red);">
            [WARNING]<br>
            IDENTITY_SYNCHRONIZATION: 12%
        </p>
        <div class="img-wrap">
            <img src="002.jpg" alt="visual" style="height: 150px; object-fit: cover;">
        </div>
    </div>

    <div class="glass-card" id="card3">
        <span class="tag-red" style="background: #000;">SYSTEM: ACTIVE</span>
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1; font-size: 12px; line-height: 1.5;">
                <span style="font-weight: bold; font-size: 18px;">1999</span><br>
                所有破碎的，<br>
                终将成为永恒。<br>
                <span style="color: #888;">#Y2K #GLITCH #ARCHIVE</span>
            </div>
            <div style="flex: 1;" class="img-wrap">
                <img src="001.jpg" alt="visual">
            </div>
        </div>
    </div>

</div>

<script>
    const cards = document.querySelectorAll('.glass-card');
    let zIndex = 10;

    cards.forEach(card => {
        let isDragging = false;
        let startX, startY, initialX, initialY;

        card.addEventListener('mousedown', (e) => {
            isDragging = true;
            card.style.zIndex = ++zIndex;
            startX = e.clientX;
            startY = e.clientY;
            initialX = card.offsetLeft;
            initialY = card.offsetTop;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            card.style.left = (initialX + dx) + 'px';
            card.style.top = (initialY + dy) + 'px';
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });
    });
</script>

</body>
</html>
